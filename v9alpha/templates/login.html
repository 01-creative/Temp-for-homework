{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户登录</h2>

    {% if request.args.get("registered") %}
    <div class="success-msg">注册成功，请登录</div>
    {% endif %}

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input class="form-input" type="text" name="username" placeholder="请输入用户名"
                   required autocomplete="username" maxlength="50">
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input class="form-input" type="password" name="password" placeholder="请输入密码"
                   required autocomplete="current-password" minlength="8" maxlength="128">
        </div>
        <div class="action-buttons">
            <button class="btn" type="submit">登录</button>
            <a class="btn btn-secondary" href="{{ url_for('register') }}">注册</a>
        </div>
    </form>
</div>
{% endblock %}
