{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input class="form-input" type="text" name="username" placeholder="请输入用户名"
                   required autocomplete="username" maxlength="50">
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input class="form-input" type="password" name="password" placeholder="请输入密码"
                   required autocomplete="new-password" minlength="8" maxlength="128">
        </div>
        <div class="form-group">
            <label class="form-label">确认密码</label>
            <input class="form-input" type="password" name="confirm_password" placeholder="请再次输入密码"
                   required autocomplete="new-password" minlength="8" maxlength="128">
        </div>
        <div class="form-group">
            <label class="form-label">邮箱</label>
            <input class="form-input" type="email" name="email" placeholder="请输入邮箱（选填）"
                   autocomplete="email" maxlength="255">
        </div>
        <div class="form-group">
            <label class="form-label">手机号</label>
            <input class="form-input" type="text" name="phone" placeholder="请输入手机号（选填）"
                   autocomplete="tel" maxlength="32">
        </div>
        <p class="password-hint">密码要求：不少于8位，包含大写字母、小写字母、数字和特殊字符</p>
        <button class="btn" type="submit">注册</button>
    </form>

    <p class="info-text" style="margin-top: 16px; text-align: center;">
        已有账号？<a href="{{ url_for('login') }}">立即登录</a>
    </p>
</div>
{% endblock %}
